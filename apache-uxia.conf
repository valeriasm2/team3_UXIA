<VirtualHost *:80>
    ServerName uxiaweb3.ieti.site
    ServerAlias *.ieti.site
    DocumentRoot /home/super/team3_UXIA/myprojectUxia/react/dist

    # Evitar caché del index.html para que no haga falta F5
    <Files "index.html">
        <ifModule mod_headers.c>
            Header set Cache-Control "max-age=0, no-cache, no-store, must-revalidate"
            Header set Pragma "no-cache"
            Header set Expires "Wed, 11 Jan 1984 05:00:00 GMT"
        </ifModule>
    </Files>

    # 1. Ajustes de proceso WSGI
    WSGIDaemonProcess uxia_backend python-home=/home/super/team3_UXIA/uxia_virtual python-path=/home/super/team3_UXIA/myprojectUxia request-timeout=300
    WSGIProcessGroup uxia_backend
    WSGIApplicationGroup %{GLOBAL}

    # 2. ALIAS para archivos estáticos
    Alias /static /home/super/team3_UXIA/myprojectUxia/static
    Alias /media /home/super/team3_UXIA/myprojectUxia/media
    Alias /assets /home/super/team3_UXIA/myprojectUxia/react/dist/assets

    # 3. Permisos de directorios
    <Directory /home/super/team3_UXIA/myprojectUxia/static>
        Require all granted
    </Directory>
    <Directory /home/super/team3_UXIA/myprojectUxia/media>
        Require all granted
    </Directory>
    <Directory /home/super/team3_UXIA/myprojectUxia/react/dist>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # 4. REGLAS DE REESCRITURA (Para React Router SPA)
    # Excluimos rutas de Django y assets reales
    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/django-admin
    RewriteCond %{REQUEST_URI} !^/api
    RewriteCond %{REQUEST_URI} !^/static
    RewriteCond %{REQUEST_URI} !^/media
    RewriteCond %{REQUEST_URI} !^/assets
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteRule ^ /index.html [L]

    # 5. CONFIGURACIÓN WSGI (Solo para /django-admin y /api)
    WSGIScriptAlias /django-admin /home/super/team3_UXIA/myprojectUxia/myprojectUxia/wsgi.py
    WSGIScriptAlias /api /home/super/team3_UXIA/myprojectUxia/myprojectUxia/wsgi.py

    <Directory /home/super/team3_UXIA/myprojectUxia/myprojectUxia>
        <Files wsgi.py>
            Require all granted
        </Files>
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/uxia_error.log
    CustomLog ${APACHE_LOG_DIR}/uxia_access.log combined
</VirtualHost>
